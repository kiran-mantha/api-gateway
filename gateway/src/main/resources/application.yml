server:
  port: 8080

spring:
  application:
    name: api-gateway

  # Redis connection
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms

  # R2DBC (reactive PostgreSQL)
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:gatewaydb}
    username: ${SPRING_R2DBC_USERNAME:postgres}
    password: ${SPRING_R2DBC_PASSWORD:root}
    pool:
      initial-size: 2
      max-size: 10

  cloud:
    gateway:
      routes:
        # Update your existing routes to include the circuit breaker filter

        - id: user-service-route
          uri: http://user-service:8081
          predicates:
            - Path=/api/users/**
          filters:
            - name: CircuitBreaker
              args:
                name: userServiceCB
                fallbackUri: forward:/fallback/user-service

        - id: order-service-route
          uri: http://order-service:8082
          predicates:
            - Path=/api/orders/**
          filters:
            - name: CircuitBreaker
              args:
                name: orderServiceCB
                fallbackUri: forward:/fallback/order-service

        # Fallback route — handled by gateway itself
        - id: fallback-route
          uri: http://localhost:8080
          predicates:
            - Path=/fallback/**

# Resilience4j circuit breaker configuration
resilience4j:
  circuitbreaker:
    configs:
      # Shared default config — both services inherit this
      default:
        # How many calls to sample when deciding to trip
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10

        # Trip open if 50% of the last 10 calls failed
        failure-rate-threshold: 50

        # Also trip if 50% of calls are slow (> slow-call-duration-threshold)
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 3s

        # Minimum calls before failure rate is calculated
        # Prevents tripping on the very first failure
        minimum-number-of-calls: 5

        # How long to stay OPEN before moving to HALF-OPEN
        wait-duration-in-open-state: 30s

        # How many calls to allow through in HALF-OPEN state
        permitted-number-of-calls-in-half-open-state: 3

        # Move to HALF-OPEN automatically (don't wait for a request)
        automatic-transition-from-open-to-half-open-enabled: true

    instances:
      userServiceCB:
        base-config: default
      orderServiceCB:
        base-config: default
        # Override for order service — stricter, business-critical
        wait-duration-in-open-state: 20s

  # Timeout config — how long gateway waits before counting as a failure
  timelimiter:
    configs:
      default:
        timeout-duration: 5s
        cancel-running-future: true
    instances:
      userServiceCB:
        base-config: default
      orderServiceCB:
        base-config: default

# Expose health endpoint for Docker healthcheck
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: never
    gateway:
      enabled: true
  health:
    circuitbreakers:
      enabled: true

services:
  gateway:
    uri: ${GATEWAY_URI:http://localhost:8080}
  user-service:
    uri: ${USER_SERVICE_URI:http://localhost:8081}
  order-service:
    uri: ${ORDER_SERVICE_URI:http://localhost:8082}

jwt:
  secret: ${JWT_SECRET:my-super-secret-key-that-is-at-least-32-chars-long}
  expiration: ${JWT_EXPIRY_MS:3600000} # 1 hour in milliseconds

rate-limit:
  default-max-tokens: 60
  default-refill-rate: 60
  default-window-seconds: 60
  roles:
    ADMIN:
      max-tokens: 1000
      refill-rate: 1000
      window-seconds: 60
    USER:
      max-tokens: 60
      refill-rate: 60
      window-seconds: 60